<!a html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

  <div class="bg-gray-100 text-white-800">
<header>
  <div class=" relative flex-col flex justify-center items-center w-full h-96">
  <img src="assets\kelly-sikkema-4le7k9XVYjE-unsplash (1).jpg" alt="" class="w-full h-full object-cover rounded-md shadow-md">
  <h3 class="absolute  text-6xl font-bold text-white text-center font-serif hover:text-pink-100 animate-pulse">THE GIVING GALA</h3>
</div>
</header>
<main class="container max-screen-xl mx-auto px-4 py-8">
  <section class="bg-gray-100 p-6 border shadow-md mt-8 ">
    <p class="font-semibold fon-sans text-2xl text-center">A philanthropic, impact-driven event that celebrates compassionate, community-focused efforts to empower individuals and bring about transformative change</p>
    <div class="relative w-full max-w-4xl mx-auto">
      <!-- Slides -->
      <div class="overflow-hidden relative h-64 rounded-lg">
        <!-- Slide 1 -->
        <input type="radio" name="carousel" id="slide-1" class="hidden peer" checked />
        <div
          class="absolute inset-0 transform translate-x-0 transition-transform duration-700 peer-checked:translate-x-0"
        >
          <img
            src="assets\claudia-raya-liJGb5bsVQU-unsplash.jpg"
            alt="Slide 1"
            class="w-full h-full object-cover"
          />
        </div>
    
        <!-- Slide 2 -->
        <input type="radio" name="carousel" id="slide-2" class="hidden peer" />
        <div
          class="absolute inset-0 transform translate-x-full transition-transform duration-700 peer-checked:translate-x-0"
        >
          <img
            src="assets\jaime-lopes-0RDBOAdnbWM-unsplash.jpg"
            alt="Slide 2"
            class="w-full h-full object-cover"
          />
        </div>
    
        <!-- Slide 3 -->
        <input type="radio" name="carousel" id="slide-3" class="hidden peer" />
        <div
          class="absolute inset-0 transform -translate-x-full transition-transform duration-700 peer-checked:translate-x-0"
        >
          <img
            src="assets\joel-muniz-3k3l2brxmwQ-unsplash.jpg"
            alt="Slide 3"
            class="w-full h-full object-cover"
          />
        </div>
      </div>
    
      <!-- Navigation Dots -->
      <div class="flex justify-center mt-4 space-x-4">
        <label for="slide-1" class="cursor-pointer">
          <span
            class="block w-4 h-4 bg-gray-400 rounded-full hover:bg-gray-600 transition-all duration-300 peer-checked:bg-blue-500"
          ></span>
        </label>
        <label for="slide-2" class="cursor-pointer">
          <span
            class="block w-4 h-4 bg-gray-400 rounded-full hover:bg-gray-600 transition-all duration-300 peer-checked:bg-blue-500"
          ></span>
        </label>
        <label for="slide-3" class="cursor-pointer">
          <span
            class="block w-4 h-4 bg-gray-400 rounded-full hover:bg-gray-600 transition-all duration-300 peer-checked:bg-blue-500"
          ></span>
        </label>
      </div>
    </div>
    
  </section>
</main>
  </div>
</body>
</html>
